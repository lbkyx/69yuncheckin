name: Python CI 2

on:
  # 每天北京时间9:10触发（UTC时间1:10）
  schedule:
    - cron: '10 1 * * *'

  # 允许手动触发
  workflow_dispatch:

  # 提交代码到 main 分支时触发
  push:
    branches:
      - main

jobs:
  # ========== 原有的签到任务 ==========
  signin-job:
    name: 69云签到
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      USER1: ${{ secrets.USER1 }}
      PASS1: ${{ secrets.PASS1 }}
      USER2: ${{ secrets.USER2 }}
      PASS2: ${{ secrets.PASS2 }}
      # 如果你有更多账号，继续加 USER3, PASS3 等
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        run: python 69yun.py

  # ========== 新增的保活任务 ==========
  keepalive-job:
    name: 保活任务 - 防止定时任务被禁用
    runs-on: ubuntu-latest
    permissions:
      actions: write   # 必须！允许任务调用 GitHub API
    steps:
      - name: 检查仓库代码
        uses: actions/checkout@v4

      - name: 执行保活操作
        uses: gautamkrishnar/keepalive-workflow@v2
