name: Python CI 2

on:
  schedule:
    - cron: '10 1 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # 原有的签到任务
  signin-job:
    name: 69云签到
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      USER1: ${{ secrets.USER1 }}
      PASS1: ${{ secrets.PASS1 }}
      USER2: ${{ secrets.USER2 }}
      PASS2: ${{ secrets.PASS2 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Python script
        run: python 69yun.py

  # 保活任务（只做空提交，不触发工作流）
  keepalive-job:
    name: 保活任务 - 防止定时任务被禁用
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          
      - name: 空提交保活（每7天一次）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查上一次保活提交是否超过7天
          if [ ! -f .last_keepalive ] || [ $(($(date +%s) - $(cat .last_keepalive))) -gt 604800 ]; then
            git commit --allow-empty -m "chore: 保活提交 $(date '+%Y-%m-%d')"
            git push
            date +%s > .last_keepalive
            git add .last_keepalive
            git commit -m "chore: 更新保活记录"
            git push
            echo "已执行保活提交"
          else
            echo "距离上次保活未满7天，跳过提交"
          fi
